name: Windows 10 RDP via ngrok

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360  # reduce from 9999 (GitHub may kill long jobs)

    steps:
    - name: Download ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip -Force
        Move-Item -Path .\ngrok\ngrok.exe -Destination .\

    - name: Authenticate ngrok
      run: .\ngrok.exe config add-authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Verify authentication
      run: .\ngrok.exe config view

    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Set a dynamic password instead of hardcoded
        $password = "P@ssw0rd$(Get-Random)"
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString $password -AsPlainText -Force)

        echo "RDP Username: runneradmin"
        echo "RDP Password: $password"

    - name: Start ngrok tunnel
      run: .\ngrok.exe tcp 3389 --log stdout
