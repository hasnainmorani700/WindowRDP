name: Windows RDP via ngrok (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Download ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip -Force
        Move-Item -Path .\ngrok\ngrok.exe -Destination .\

    - name: Authenticate ngrok
      run: .\ngrok.exe config add-authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Enable RDP + Set Password
      run: |
        # Enable RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

        # Set strong password (reliable method)
        net user runneradmin Str0ng!Pass1234

        echo "=============================="
        echo "RDP LOGIN DETAILS"
        echo "Username: runneradmin"
        echo "Password: Str0ng!Pass1234"
        echo "=============================="

    - name: Ensure RDP is ready
      run: |
        Write-Host "Waiting for RDP to be ready..."
        Start-Sleep -Seconds 20

    - name: Start ngrok tunnel
      run: |
        Write-Host "Starting ngrok..."
        .\ngrok.exe tcp 3389 --log stdout
